<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>프랑스 여행 플래너</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f7f8fa;
      --white: #fff;
      --gray50: #f9fafb;
      --gray100: #f2f4f6;
      --gray200: #e5e8eb;
      --gray300: #d1d6db;
      --gray400: #b0b8c1;
      --gray500: #8b95a1;
      --gray600: #6b7684;
      --gray700: #4e5968;
      --gray800: #333d4b;
      --gray900: #191f28;
      --blue: #3182f6;
      --blue-bg: #e8f3ff;
      --blue-light: #ebf5ff;
      --red: #f04452;
      --red-bg: #fff0f0;
      --orange: #f59e0b;
      --orange-bg: #fff8e1;
      --green: #00b386;
      --green-bg: #e8fff3;
      --purple: #8b5cf6;
      --purple-bg: #f3f0ff;
      --pink: #e91e8b;
      --pink-bg: #fff0f7;
      --teal: #06b6d4;
      --teal-bg: #ecfeff;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --shadow: 0 2px 8px rgba(0, 0, 0, .04), 0 0 1px rgba(0, 0, 0, .06);
      --shadow-lg: 0 8px 28px rgba(0, 0, 0, .12);
      --transition: cubic-bezier(.4, 0, .2, 1);
      --bottom-nav: 64px;
    }

    html,
    body {
      font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--gray900);
      min-height: 100vh;
      overflow-x: hidden;
      padding-bottom: calc(var(--bottom-nav) + env(safe-area-inset-bottom, 20px) + 40px);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    /* ===== Bottom Nav ===== */
    .bottom-nav {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 440px;
      background: var(--white);
      border: 1px solid var(--gray100);
      display: flex;
      z-index: 200;
      height: var(--bottom-nav);
      border-radius: 24px;
      box-shadow: var(--shadow-lg);
      margin-bottom: env(safe-area-inset-bottom, 0px);
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 8px 0;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--gray400);
      font-size: 10px;
      font-weight: 600;
      transition: all .15s;
    }

    .nav-item.active {
      color: var(--gray900);
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    /* ===== Pages ===== */
    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    /* ===== Header ===== */
    .page-header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: var(--bg);
      padding: 56px 20px 12px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    .page-header .sub {
      font-size: 13px;
      color: var(--gray500);
      margin-top: 4px;
      font-weight: 500;
    }

    /* ===== Timeline ===== */
    .timeline {
      padding: 0 20px 20px;
    }

    .day-item {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      transition: all .15s var(--transition);
      box-shadow: var(--shadow);
      position: relative;
    }

    .day-item .day-top-area {
      cursor: pointer;
    }

    .day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .day-date {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -.2px;
    }

    .city-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .city-badge.nice {
      background: #e0f2fe;
      color: #0369a1;
    }

    .city-badge.paris {
      background: #fce7f3;
      color: #be185d;
    }

    .city-badge.travel {
      background: #dcfce7;
      color: #15803d;
    }

    .day-meta {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .day-hotel {
      font-size: 12px;
      color: var(--gray500);
      font-weight: 500;
    }

    .day-memo {
      font-size: 12px;
      color: var(--orange);
      font-weight: 600;
    }

    .day-pills {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .pill.museum {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .pill.food {
      background: var(--orange-bg);
      color: #b45309;
    }

    .pill.tour {
      background: var(--green-bg);
      color: var(--green);
    }

    .pill.spot {
      background: var(--teal-bg);
      color: var(--teal);
    }

    .day-empty {
      font-size: 12px;
      color: var(--gray300);
      margin-top: 8px;
    }

    /* ===== Content Page - Category Tabs ===== */
    .cat-tabs {
      display: flex;
      gap: 6px;
      padding: 0 20px 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .cat-tabs::-webkit-scrollbar {
      display: none;
    }

    .cat-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--gray100);
      color: var(--gray600);
      transition: all .15s;
    }

    .cat-tab.active {
      background: var(--gray900);
      color: #fff;
    }

    /* ===== Content Page - City Toggle ===== */
    .city-toggle {
      display: flex;
      margin: 0 20px 14px;
      background: var(--gray100);
      border-radius: var(--radius-sm);
      padding: 3px;
      position: relative;
    }

    .city-toggle-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: var(--gray500);
      transition: all .2s;
      z-index: 1;
      position: relative;
    }

    .city-toggle-btn.active {
      color: var(--gray900);
      background: var(--white);
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
    }

    /* ===== Content Page - Sub Filter ===== */
    .sub-filter {
      display: flex;
      gap: 6px;
      padding: 0 20px 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sub-filter::-webkit-scrollbar {
      display: none;
    }

    .sf-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1.5px solid var(--gray200);
      background: var(--white);
      font-size: 12px;
      font-weight: 600;
      color: var(--gray600);
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap;
    }

    .sf-btn.active {
      background: var(--gray900);
      color: #fff;
      border-color: var(--gray900);
    }

    /* ===== Cards ===== */
    .card-list {
      padding: 0 20px 20px;
    }

    .ccard {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all .15s;
      position: relative;
    }

    .ccard:active {
      transform: scale(.98);
      background: var(--gray50);
    }

    .ccard-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .ccard-name {
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .ccard-desc {
      font-size: 12px;
      color: var(--gray500);
      margin-top: 4px;
      line-height: 1.4;
    }

    .ccard-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 8px;
    }

    .ccard-link {
      font-size: 11px;
      color: var(--blue);
      font-weight: 600;
      margin-top: 8px;
      display: inline-flex;
      align-items: center;
      gap: 3px;
    }

    .ccard-link svg {
      width: 12px;
      height: 12px;
    }

    .sm {
      display: inline-flex;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 10px;
      font-weight: 600;
    }

    .sm.blue {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .sm.orange {
      background: var(--orange-bg);
      color: #b45309;
    }

    .sm.green {
      background: var(--green-bg);
      color: var(--green);
    }

    .sm.gray {
      background: var(--gray100);
      color: var(--gray600);
    }

    .sm.red {
      background: var(--red-bg);
      color: var(--red);
    }

    .sm.free {
      background: #dcfce7;
      color: #15803d;
      font-weight: 700;
    }

    .sm.pink {
      background: var(--pink-bg);
      color: var(--pink);
    }

    .sm.purple {
      background: var(--purple-bg);
      color: var(--purple);
    }

    .sm.teal {
      background: var(--teal-bg);
      color: var(--teal);
    }

    /* ===== Status Chip (food) ===== */
    .st-chip {
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all .15s;
      flex-shrink: 0;
    }

    .st-chip[data-s="none"] {
      background: var(--gray100);
      color: var(--gray600);
    }

    .st-chip[data-s="eaten"] {
      background: #dcfce7;
      color: #15803d;
    }

    .st-chip[data-s="pass"] {
      background: var(--red-bg);
      color: var(--red);
      text-decoration: line-through;
    }

    /* ===== Info Box ===== */
    .info-box {
      margin: 0 20px 16px;
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      line-height: 1.6;
      color: var(--gray700);
    }

    .info-box.blue {
      background: var(--blue-bg);
      color: #1d4ed8;
    }

    .info-box.orange {
      background: var(--orange-bg);
      color: #92400e;
    }

    .info-box.green {
      background: var(--green-bg);
      color: #065f46;
    }

    .info-box b {
      font-weight: 700;
    }

    .info-box a {
      color: var(--blue);
      text-decoration: underline;
    }

    /* ===== Bottom Sheet ===== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      z-index: 300;
      opacity: 0;
      visibility: hidden;
      transition: opacity .3s, visibility .3s;
    }

    .overlay.show {
      opacity: 1;
      visibility: visible;
    }

    .sheet {
      position: fixed;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 480px;
      bottom: 0;
      z-index: 301;
      background: var(--white);
      border-radius: 20px 20px 0 0;
      transition: transform .35s var(--transition);
      max-height: 92vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .sheet.show {
      transform: translateX(-50%) translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--gray200);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      padding: 16px 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--gray100);
      flex-shrink: 0;
    }

    .sheet-title {
      font-size: 17px;
      font-weight: 700;
    }

    .sheet-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--gray100);
      border: none;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray600);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sheet-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      padding: 12px 20px 20px;
    }

    /* ===== Day Detail ===== */
    .si {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: var(--gray50);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
    }

    .si-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }

    .si-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .si-dot.museum {
      background: var(--blue);
    }

    .si-dot.food {
      background: var(--orange);
    }

    .si-dot.tour {
      background: var(--green);
    }

    .si-dot.spot {
      background: var(--teal);
    }

    .si-dot.custom {
      background: var(--purple);
    }

    .si-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .si-sub {
      font-size: 12px;
      color: var(--gray500);
      margin-top: 1px;
    }

    .si-rm {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: var(--red-bg);
      color: var(--red);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: 1.5px dashed var(--gray200);
      background: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--blue);
      cursor: pointer;
      transition: all .15s;
      margin-top: 12px;
    }

    .add-btn:hover {
      border-color: var(--blue);
      background: var(--blue-light);
    }

    /* ===== Add Sheet ===== */
    .add-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      background: var(--white);
      padding: 4px 0 10px;
      z-index: 10;
    }

    .add-tab {
      padding: 8px 16px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--gray100);
      color: var(--gray600);
      transition: all .15s;
    }

    .add-tab.active {
      background: var(--gray900);
      color: #fff;
    }

    .add-sec {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray400);
      padding: 12px 0 8px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .add-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray100);
    }

    .add-row:last-child {
      border-bottom: none;
    }

    .ar-left {
      flex: 1;
      min-width: 0;
    }

    .ar-name {
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
    }

    .ar-desc {
      font-size: 11px;
      color: var(--gray500);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ar-meta {
      display: flex;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .ar-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 12px;
      transition: all .1s;
    }

    .ar-btn:active {
      transform: scale(.9);
    }

    .ar-btn.done {
      background: var(--gray200);
      color: var(--gray500);
    }

    /* ===== Checklist ===== */
    .chk-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--gray700);
      padding: 16px 20px 8px;
    }

    .chk-list {
      padding: 0 20px;
    }

    .chk {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray100);
      cursor: pointer;
    }

    .chk:last-child {
      border-bottom: none;
    }

    .chk-box {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 2px solid var(--gray300);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .15s;
      font-size: 13px;
      color: transparent;
    }

    .chk.done .chk-box {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .chk.done .chk-text {
      color: var(--gray400);
      text-decoration: line-through;
    }

    .chk-text {
      font-size: 14px;
      font-weight: 500;
    }

    .chk-memo {
      font-size: 12px;
      color: var(--gray400);
      margin-top: 1px;
    }

    /* ===== Tips ===== */
    .tip-sec {
      padding: 0 20px;
      margin-bottom: 20px;
    }

    .tip-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .tip-c {
      background: var(--white);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--gray700);
      box-shadow: var(--shadow);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: calc(var(--bottom-nav) + 16px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gray900);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      z-index: 400;
      opacity: 0;
      transition: all .3s var(--transition);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--gray400);
      font-size: 13px;
    }

    /* ===== Day Action Buttons ===== */
    .day-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .day-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: var(--radius-xs);
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .day-action-btn.add {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .day-action-btn.add:active {
      background: #d0e4ff;
    }

    .day-action-btn.course {
      background: var(--gray900);
      color: #fff;
    }

    .day-action-btn.course:active {
      opacity: .85;
    }

    .day-action-btn:disabled {
      background: var(--gray100);
      color: var(--gray300);
      cursor: default;
    }

    /* ===== Course Sheet ===== */
    .course-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 4px 0;
    }

    .course-line {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 24px;
      flex-shrink: 0;
    }

    .course-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2.5px solid var(--blue);
      background: var(--white);
      flex-shrink: 0;
      z-index: 1;
    }

    .course-dot.hotel {
      border-color: var(--gray400);
      background: var(--gray400);
    }

    .course-dot.museum {
      border-color: var(--blue);
      background: var(--blue);
    }

    .course-dot.food {
      border-color: var(--orange);
      background: var(--orange);
    }

    .course-dot.tour {
      border-color: var(--green);
      background: var(--green);
    }

    .course-dot.spot {
      border-color: var(--teal);
      background: var(--teal);
    }

    .course-dot.custom {
      border-color: var(--purple);
      background: var(--purple);
    }

    .course-connector {
      width: 2px;
      flex: 1;
      min-height: 28px;
      background: var(--gray200);
    }

    .course-info {
      flex: 1;
      padding-bottom: 6px;

    };

      if (it.type === 'tour') { const t = TOURS.find(x => x.id === it.id); return t ? `${t.price} · ${t.dur}` : '' }

    }

    // ========== COURSE SHEET ==========
    function findItem(id, type) {
      if (type === 'museum') return MUSEUMS.find(x => x.id === id);
      if (type === 'food') return FOODS.find(x => x.id === id);
      if (type === 'tour') return TOURS.find(x => x.id === id);
      if (type === 'spot') return SPOTS.find(x => x.id === id);
      // check custom
      const c = S.custom.find(x => x.id === id);
      if (c) return c;
      return null;
    }
    function getZone(it) {
      const src = findItem(it.id, it.type);
      return src && src.zone ? src.zone : (it.zone || 'zzz');
    }
    function getGmap(it) {
      const src = findItem(it.id, it.type);
      return src && src.gmap ? src.gmap : (it.gmap || it.name);
    }
    function sortByZone(items, ck) {
      const city = ck === 'nice' ? 'nice' : (ck === 'paris' ? 'paris' : null);
      if (!city) return items;
      const zo = ZONE_ORDER[city] || [];
      return [...items].sort((a, b) => {
        const ai = zo.indexOf(getZone(a)), bi = zo.indexOf(getZone(b));
        return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
      });
    }
    // duration parsing: "1~1.5h" → 75, "30min" → 30, "반나절" → 240
    function parseDur(str) {
      if (!str) return 45;
      const hm = str.match(/(\d+\.?\d*)~(\d+\.?\d*)\s*h/i);
      if (hm) return Math.round((parseFloat(hm[1]) + parseFloat(hm[2])) / 2 * 60);
      const h1 = str.match(/(\d+\.?\d*)\s*h/i);
      if (h1) return Math.round(parseFloat(h1[1]) * 60);
      const mm = str.match(/(\d+)\s*min/i);
      if (mm) return parseInt(mm[1]);
      if (str.includes('반나절')) return 240;
      return 45;
    }
    // zone 간 실제 이동시간 (분) - 구글맵 기반 사전 조사
    const ZT = {
      // === 니스 (버스/도보 기준) ===
      // 치미에 (언덕, 마티스/샤갈) - 시내에서 버스 15/17번 20~25분
      'nice-cimiez|nice-port': 25, 'nice-cimiez|nice-center': 20,
      'nice-cimiez|nice-old': 25, 'nice-cimiez|nice-promenade': 25,
      // 항구 - 구시가지 동쪽, 도보 10~15분
      'nice-port|nice-center': 15, 'nice-port|nice-old': 10, 'nice-port|nice-promenade': 15,
      // 시내 중심 (MAMAC, 마세나, Liberation) ↔ 구시가지 도보 8분
      'nice-center|nice-old': 8, 'nice-center|nice-promenade': 8,
      // 구시가지 ↔ 해변 도보 5분
      'nice-old|nice-promenade': 5,
      // 근교 (에즈 버스82번 30분, 모나코 기차 20분, 생폴드방스 버스400번 50분)
      'nice-cimiez|nice-suburb': 50, 'nice-port|nice-suburb': 45,
      'nice-center|nice-suburb': 45, 'nice-old|nice-suburb': 45, 'nice-promenade|nice-suburb': 45,

      // === 파리 (메트로+도보 기준) ===
      // 몽마르뜨 (18구, 사크레쾨르) - 북쪽 언덕
      'paris-montmartre|paris-opera': 12, 'paris-montmartre|paris-louvre': 20,
      'paris-montmartre|paris-marais': 22, 'paris-montmartre|paris-latin': 25,
      'paris-montmartre|paris-stgermain': 25, 'paris-montmartre|paris-eiffel': 28,
      // 오페라 (9구, 라파예트/자크마르앙드레)
      'paris-opera|paris-louvre': 12, 'paris-opera|paris-marais': 15,
      'paris-opera|paris-latin': 20, 'paris-opera|paris-stgermain': 18, 'paris-opera|paris-eiffel': 18,
      // 루브르 (1구, 루브르/오랑주리/생트샤펠)
      'paris-louvre|paris-marais': 15, 'paris-louvre|paris-latin': 12,
      'paris-louvre|paris-stgermain': 10, 'paris-louvre|paris-eiffel': 18,
      // 마레 (3-4구, 피카소/팔라펠/핑크맘마) - 도보 동네
      'paris-marais|paris-latin': 12, 'paris-marais|paris-stgermain': 15, 'paris-marais|paris-eiffel': 22,
      // 라탱 (5구, 노트르담/생마르탱운하)
      'paris-latin|paris-stgermain': 8, 'paris-latin|paris-eiffel': 18,
      // 생제르맹 (6-7구, 오르세/뤽상부르/봉막셰)
      'paris-stgermain|paris-eiffel': 15,
      // 근교 (베르사유 RER C 35~45분)
      'paris-montmartre|paris-suburb': 50, 'paris-opera|paris-suburb': 45,
      'paris-louvre|paris-suburb': 40, 'paris-marais|paris-suburb': 45,
      'paris-latin|paris-suburb': 40, 'paris-stgermain|paris-suburb': 38, 'paris-eiffel|paris-suburb': 35
    };
    function zoneTravelMin(zA, zB) {
      if (!zA || !zB || zA === zB) return 5;
      const k1 = zA + '|' + zB, k2 = zB + '|' + zA;
      return ZT[k1] || ZT[k2] || 20;
    }
    function fmtTime(min) { const h = Math.floor(min / 60), m = min % 60; return `${h}:${m < 10 ? '0' + m : m}`; }

    function openCourse(dk) {
      curDate = dk; const day = DAYS.find(d => d.date === dk); if (!day) return;
      const items = S.sch[dk] || []; if (!items.length) return;
      const city = day.ck === 'travel' ? 'paris' : (day.ck === 'nice' ? 'nice' : 'paris');
      const hotelGmap = day.hgmap || day.hotel;
      const hotelZone = day.hz || null;

      // separate food vs non-food
      const foods = [], others = [];
      items.forEach(it => { (it.type === 'food' ? foods : others).push(it); });
      const sorted = sortByZone(others, city);

      // 식사 슬롯 배정: 점심(12:00), 저녁(18:30) 등 시간대별 분배
      const mealSlots = [];
      if (foods.length === 1) {
        mealSlots.push({ item: foods[0], targetTime: 12 * 60, label: '점심' });
      } else if (foods.length === 2) {
        mealSlots.push({ item: foods[0], targetTime: 12 * 60, label: '점심' });
        mealSlots.push({ item: foods[1], targetTime: 18.5 * 60, label: '저녁' });
      } else if (foods.length >= 3) {
        mealSlots.push({ item: foods[0], targetTime: 10 * 60, label: '브런치' });
        mealSlots.push({ item: foods[1], targetTime: 13 * 60, label: '점심' });
        mealSlots.push({ item: foods[2], targetTime: 18.5 * 60, label: '저녁' });
        for (let i = 3; i < foods.length; i++) mealSlots.push({ item: foods[i], targetTime: 20 * 60 + (i - 3) * 60, label: '간식' });
      }

      const schedule = [];
      let t = 9 * 60, prevZone = hotelZone, prevGmap = hotelGmap, mealIdx = 0;
      schedule.push({ type: 'hotel', time: t, name: day.hotel, gmap: hotelGmap });

      for (let i = 0; i < sorted.length; i++) {
        const it = sorted[i];
        const src = findItem(it.id, it.type);
        const zone = getZone(it);
        const gm = getGmap(it);
        const dur = src ? parseDur(src.dur) : 45;

        // 이 아이템 전에 식사를 넣어야 하는지 체크
        while (mealIdx < mealSlots.length) {
          const meal = mealSlots[mealIdx];
          const travelToNext = zoneTravelMin(prevZone, zone);
          const itemEndTime = t + travelToNext + dur;
          if (t >= meal.targetTime - 30 || itemEndTime > meal.targetTime + 60) {
            const mGmap = getGmap(meal.item), mZone = getZone(meal.item);
            const mt = zoneTravelMin(prevZone, mZone);
            schedule.push({ type: 'travel', min: mt, from: prevGmap, to: mGmap });
            t += mt;
            schedule.push({ type: 'meal', time: t, item: meal.item, dur: 60, label: meal.label });
            t += 60; prevGmap = mGmap; prevZone = mZone; mealIdx++;
          } else break;
        }

        const tv = zoneTravelMin(prevZone, zone);
        schedule.push({ type: 'travel', min: tv, from: prevGmap, to: gm });
        t += tv;
        schedule.push({ type: 'place', time: t, item: it, src, dur });
        t += dur; prevGmap = gm; prevZone = zone;
      }

      // 남은 식사 (non-food가 적어서 아직 안 넣은 것들)
      while (mealIdx < mealSlots.length) {
        const meal = mealSlots[mealIdx];
        const mGmap = getGmap(meal.item), mZone = getZone(meal.item);
        if (t < meal.targetTime - 30) t = meal.targetTime;
        const mt = zoneTravelMin(prevZone, mZone);
        schedule.push({ type: 'travel', min: mt, from: prevGmap, to: mGmap });
        t += mt;
        schedule.push({ type: 'meal', time: t, item: meal.item, dur: 60, label: meal.label });
        t += 60; prevGmap = mGmap; prevZone = mZone; mealIdx++;
      }

      const tvHome = prevZone ? zoneTravelMin(prevZone, hotelZone) : 15;
      schedule.push({ type: 'travel', min: tvHome, from: prevGmap, to: hotelGmap });
      t += tvHome;
      schedule.push({ type: 'hotel', time: t, name: day.hotel, gmap: hotelGmap });

      // render
      document.getElementById('csTitle').textContent = `${day.date} (${day.day}) 추천 코스`;
      const b = document.getElementById('csBody');
      let h = '';

      schedule.forEach(s => {
        if (s.type === 'hotel') {
          h += `<div class="course-item"><div class="course-line"><div class="course-dot hotel"></div><div class="course-connector"></div></div><div class="course-info"><div class="course-name"><b>${fmtTime(s.time)}</b>&nbsp; 🏨 ${s.name}</div></div></div>`;
        }
        if (s.type === 'travel') {
          const mode = s.min <= 8 ? '🚶 도보' : s.min <= 20 ? '🚶 도보 또는 🚌 버스/메트로' : '🚌 메트로/버스';
          h += `<a class="course-dir" href="${gmapDir(s.from, s.to)}" target="_blank">${mode} ~${s.min}분 · 📍 구글맵으로 길찾기 →</a>`;
        }
        if (s.type === 'place') {
          const it = s.item, src = s.src;
          const emoji = TYPE_EMOJI[it.type] || '📌';
          let meta = '약 ' + Math.round(s.dur / 15) * 15 + '분';
          if (src) {
            if (src.price) meta = src.price + ' · ' + meta;
          }
          h += `<div class="course-item"><div class="course-line"><div class="course-dot ${it.type || 'custom'}"></div><div class="course-connector"></div></div><div class="course-info"><div class="course-name"><b>${fmtTime(s.time)}</b>&nbsp; ${emoji} ${it.name}</div><div class="course-meta">${meta}</div></div></div>`;
        }
        if (s.type === 'meal') {
          const it = s.item;
          const src = findItem(it.id, it.type);
          let meta = '약 1시간';
          if (src && src.price) meta = src.price + ' · ' + meta;
          h += `<div class="course-item"><div class="course-line"><div class="course-dot food"></div><div class="course-connector"></div></div><div class="course-info"><div class="course-name"><b>${fmtTime(s.time)}</b>&nbsp; 🍽️ ${it.name} <span class="sm orange">${s.label}</span></div><div class="course-meta">${meta}</div></div></div>`;
        }
      });

      // summary
      const totalHr = Math.round((t - 9 * 60) / 60 * 10) / 10;
      let totalPrice = 0;
      items.forEach(it => {
        const src = findItem(it.id, it.type);
        if (src && src.price && !src.free) { const m = src.price.match(/(\d+\.?\d*)/); if (m) totalPrice += parseFloat(m[1]); }
      });
      h += `<div class="course-summary">`;
      h += `<b>⏱️ 예상 소요</b> 약 ${totalHr}시간 (${fmtTime(9 * 60)} ~ ${fmtTime(t)})<br>`;
      if (totalPrice) h += `<b>💰 예상 비용</b> ~${totalPrice}€<br>`;
      h += `<br><b>💡 팁</b><br>• 각 "구글맵으로 길찾기"를 탭 → 실시간 경로 확인<br>• 이동시간은 추정치입니다. 실제는 구글맵에서 확인하세요<br>• 맛집은 점심/저녁 시간대에 자동 배치됩니다</div>`;
      b.innerHTML = h;
      openS(cs);
    }

    // ========== ADD SHEET ==========
    let addCat = 'museum';
    function renderAS() {
      const b = document.getElementById('asBody');
      const day = DAYS.find(d => d.date === curDate);
      const exist = new Set((S.sch[curDate] || []).map(x => x.id));
      const cityPri = day && (day.ck === 'nice' || day.ck === 'paris') ? day.ck : null;
      let h = `<div class="add-tabs">
    ${['museum', 'food', 'tour', 'spot'].map(c => `<button class="add-tab ${addCat === c ? 'active' : ''}" data-ac="${c}">${{ museum: '미술관', food: '맛집', tour: '투어', spot: '관광지' }[c]}</button>`).join('')}
  </div>`;

      function sec(label) { h += `<div class="add-sec">${label}</div>`; }
      function row(id, type, name, desc, badges, added) {
        h += `<div class="add-row"><div class="ar-left"><div class="ar-name">${name}</div>${desc ? `<div class="ar-desc">${desc}</div>` : ''}<div class="ar-meta">${badges}</div></div><button class="ar-btn ${added ? 'done' : ''}" data-aid="${id}" data-at="${type}" data-an="${name}" ${added ? 'disabled' : ''}>${added ? '✓' : '+'}</button></div>`;
      }

      const order = (arr, ck) => {
        if (!ck) return [{ items: arr, label: '전체' }];
        const a = arr.filter(x => x.city === ck), b = arr.filter(x => x.city !== ck);
        const la = ck === 'nice' ? '니스' : '파리', lb = ck === 'nice' ? '파리' : '니스';
        const r = [{ items: a, label: la }];
        if (b.length) r.push({ items: b, label: lb });
        return r;
      };

      if (addCat === 'museum') {
        order(MUSEUMS, cityPri).forEach(g => {
          sec(g.label);
          g.items.forEach(m => {
            const bd = `<span class="sm blue">${m.price}</span><span class="sm gray">${m.dur}</span>${m.closed !== '없음' ? `<span class="sm red">${m.closed} 휴관</span>` : ''}${m.free ? '<span class="sm free">무료</span>' : ''}`;
            row(m.id, 'museum', m.name, m.desc, bd, exist.has(m.id));
          });
        });
      }
      if (addCat === 'food') {
        order(FOODS, cityPri).forEach(g => {
          sec(g.label);
          g.items.forEach(f => {
            const bd = `<span class="sm orange">${f.price}</span><span class="sm gray">${f.cat}</span>${f.rsv.includes('필수') ? `<span class="sm pink">예약${f.rsv}</span>` : ''}${f.note ? `<span class="sm orange">${f.note}</span>` : ''}`;
            row(f.id, 'food', f.name, f.desc, bd, exist.has(f.id));
          });
        });
      }
      if (addCat === 'tour') {
        order(TOURS, cityPri).forEach(g => {
          sec(g.label);
          g.items.forEach(t => {
            const bd = `<span class="sm green">${t.price}</span><span class="sm gray">${t.dur}</span>${t.note ? `<span class="sm orange">${t.note}</span>` : ''}`;
            row(t.id, 'tour', t.name, '', bd, exist.has(t.id));
          });
        });
      }
      if (addCat === 'spot') {
        order(SPOTS, cityPri).forEach(g => {
          sec(g.label);
          g.items.forEach(s => {
            const bd = `<span class="sm teal">${s.cat}</span>`;
            row(s.id, 'spot', s.name, s.desc, bd, exist.has(s.id));
          });
        });
      }

      // custom items for current category
      const customForCat = S.custom.filter(c => c.type === addCat);
      if (customForCat.length) {
        sec('직접 추가한 항목');
        customForCat.forEach(c => {
          const bd = `<span class="sm purple">직접 추가</span>${c.price ? `<span class="sm gray">${c.price}</span>` : ''}`;
          row(c.id, c.type, c.name, c.desc || '', bd, exist.has(c.id));
        });
      }

      b.innerHTML = h;
      b.querySelectorAll('.add-tab').forEach(t => t.onclick = () => { addCat = t.dataset.ac; renderAS(); });
      b.querySelectorAll('.ar-btn:not(.done)').forEach(btn => btn.onclick = e => {
        e.stopPropagation(); const { aid, at, an } = btn.dataset;
        if (!S.sch[curDate]) S.sch[curDate] = [];
        const entry = { id: aid, type: at, name: an };
        // custom item인 경우 gmap도 저장
        const cust = S.custom.find(c => c.id === aid);
        if (cust) entry.gmap = cust.gmap;
        S.sch[curDate].push(entry); save();
        btn.classList.add('done'); btn.disabled = true; btn.textContent = '✓';
        toast(an + ' 추가됨'); renderTL();
      });
    }

    // ========== CONTENT PAGE ==========
    let cCat = 'museum', cCity = 'nice', cSub = '전체';
    const FOOD_SUBS = ['전체', '미슐랭', '부이용', '비스트로', '캐주얼', '아침', '먹음', '패스'];
    const SPOT_SUBS_NICE = ['전체', '산책', '거리', '마켓', '전망', '광장', '근교'];
    const SPOT_SUBS_PARIS = ['전체', '랜드마크', '거리', '건축', '공원', '전망', '쇼핑', '산책', '근교'];
    const SC = ['none', 'eaten', 'pass'], SL = { none: '☐ 후보', eaten: '✅ 먹음', pass: '❌ 패스' };

    function renderContent() {
      // Cat tabs
      document.getElementById('catTabs').innerHTML = ['museum', 'food', 'tour', 'spot'].map(c =>
        `<button class="cat-tab ${cCat === c ? 'active' : ''}" data-cc="${c}">${{ museum: '미술관', food: '맛집', tour: '투어', spot: '관광지' }[c]}</button>`
      ).join('');
      document.querySelectorAll('[data-cc]').forEach(b => b.onclick = () => { cCat = b.dataset.cc; cSub = '전체'; renderContent(); });

      // City toggle
      document.getElementById('cityToggle').innerHTML =
        `<button class="city-toggle-btn ${cCity === 'nice' ? 'active' : ''}" data-cv="nice">니스</button>
     <button class="city-toggle-btn ${cCity === 'paris' ? 'active' : ''}" data-cv="paris">파리</button>`;
      document.querySelectorAll('[data-cv]').forEach(b => b.onclick = () => { cCity = b.dataset.cv; cSub = '전체'; renderContent(); });

      // Info box
      const infoEl = document.getElementById('contentInfoBox');
      infoEl.innerHTML = '';
      if (cCat === 'museum' && MUSEUM_INFO[cCity]) {
        infoEl.innerHTML = `<div class="info-box blue">${MUSEUM_INFO[cCity]}</div>`;
      }

      // Sub filter
      const sfEl = document.getElementById('subFilter'); sfEl.innerHTML = '';
      let subs = [];
      if (cCat === 'food') subs = FOOD_SUBS;
      else if (cCat === 'spot') subs = cCity === 'nice' ? SPOT_SUBS_NICE : SPOT_SUBS_PARIS;
      subs.forEach(s => {
        sfEl.insertAdjacentHTML('beforeend', `<button class="sf-btn ${cSub === s ? 'active' : ''}" data-sf="${s}">${s}</button>`);
      });
      sfEl.querySelectorAll('[data-sf]').forEach(b => b.onclick = () => { cSub = b.dataset.sf; renderContent(); });

      // Card list
      const list = document.getElementById('contentList'); list.innerHTML = '';
      // custom items for current cat+city
      const customs = S.custom.filter(c => c.type === cCat && c.city === cCity);
      if (customs.length) {
        customs.forEach(cx => {
          const c = document.createElement('div'); c.className = 'ccard';
          const emoji = TYPE_EMOJI[cx.type] || '📌';
          const mainLink = cx.link || gmap(cx.gmap);
          const linkLabel = cx.link ? '링크 열기' : '지도에서 보기';
          c.innerHTML = `<div class="ccard-row"><div class="ccard-emoji">${emoji}</div><div class="ccard-body"><div class="ccard-name">${cx.name} <span class="sm purple">직접 추가</span></div>${cx.desc ? `<div class="ccard-desc">${cx.desc}</div>` : ''}
        <div class="ccard-badges">${cx.price ? `<span class="sm gray">${cx.price}</span>` : ''}</div>
        <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap;"><div class="ccard-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> ${linkLabel}</div><span class="ccard-link" style="color:var(--red)" data-del="${cx.id}">삭제</span></div></div></div>`;
          c.querySelector('[data-del]').onclick = e => { e.stopPropagation(); S.custom = S.custom.filter(x => x.id !== cx.id); save(); toast('삭제됨'); renderContent(); };
          c.onclick = e => { if (e.target.closest('[data-del]')) return; window.open(mainLink, '_blank'); };
          list.appendChild(c);
        });
      }

      if (cCat === 'museum') {
        MUSEUMS.filter(m => m.city === cCity).forEach(m => {
          const c = document.createElement('div'); c.className = 'ccard';
          c.innerHTML = `<div class="ccard-row"><div class="ccard-emoji">🎨</div><div class="ccard-body"><div class="ccard-name">${m.name}${m.free ? ' <span class="sm free">무료</span>' : ''}</div><div class="ccard-desc">${m.desc}</div>
        <div class="ccard-badges"><span class="sm blue">${m.price}</span><span class="sm gray">${m.dur}</span>${m.closed !== '없음' ? `<span class="sm red">${m.closed} 휴관</span>` : ''}</div>
        <div class="ccard-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Google 지도에서 보기</div></div></div>`;
          c.onclick = () => window.open(gmap(m.gmap), '_blank');
          list.appendChild(c);
        });
      }

      if (cCat === 'food') {
        let items = FOODS.filter(f => f.city === cCity);
        if (cSub === '먹음') items = items.filter(f => (S.food[f.id] || 'none') === 'eaten');
        else if (cSub === '패스') items = items.filter(f => (S.food[f.id] || 'none') === 'pass');
        else if (cSub !== '전체') items = items.filter(f => f.cat === cSub);

        if (!items.length) { list.innerHTML = '<div class="empty">해당하는 맛집이 없습니다</div>'; return; }
        items.forEach(f => {
          const st = S.food[f.id] || 'none';
          const c = document.createElement('div'); c.className = 'ccard';
          c.innerHTML = `<div class="ccard-row"><div class="ccard-emoji">🍽️</div><div class="ccard-body"><div class="ccard-top"><div><div class="ccard-name">${f.name}${f.note ? ` <span class="sm orange">${f.note}</span>` : ''}</div><div class="ccard-desc">${f.desc}</div></div>
        <button class="st-chip" data-s="${st}" data-fid="${f.id}">${SL[st]}</button></div>
        <div class="ccard-badges"><span class="sm orange">${f.price}</span><span class="sm gray">${f.cat}</span>${f.rsv.includes('필수') ? `<span class="sm pink">예약 ${f.rsv}</span>` : ''}</div>
        <div class="ccard-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Google 지도에서 보기</div></div></div>`;
          const chip = c.querySelector('.st-chip');
          chip.onclick = e => { e.stopPropagation(); const ci = SC.indexOf(chip.dataset.s); const ns = SC[(ci + 1) % 3]; S.food[f.id] = ns; save(); chip.dataset.s = ns; chip.textContent = SL[ns]; };
          c.addEventListener('click', e => { if (e.target.closest('.st-chip')) return; window.open(gmap(f.gmap), '_blank'); });
          list.appendChild(c);
        });
      }

      if (cCat === 'tour') {
        TOURS.filter(t => t.city === cCity).forEach(t => {
          const c = document.createElement('div'); c.className = 'ccard';
          c.innerHTML = `<div class="ccard-row"><div class="ccard-emoji">🚶</div><div class="ccard-body"><div class="ccard-name">${t.name}${t.note ? ` <span class="sm orange">${t.note}</span>` : ''}</div>
        <div class="ccard-badges"><span class="sm green">${t.price}</span><span class="sm gray">${t.dur}</span></div>
        ${t.link ? `<div class="ccard-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> 예약 페이지 열기</div>` : ''}</div></div>`;
          c.onclick = () => { if (t.link) window.open(t.link, '_blank'); };
          if (!t.link) c.style.cursor = 'default';
          list.appendChild(c);
        });
      }

      if (cCat === 'spot') {
        let items = SPOTS.filter(s => s.city === cCity);
        if (cSub !== '전체') items = items.filter(s => s.cat === cSub);
        if (!items.length) { list.innerHTML = '<div class="empty">해당하는 관광지가 없습니다</div>'; return; }
        items.forEach(s => {
          const c = document.createElement('div'); c.className = 'ccard';
          c.innerHTML = `<div class="ccard-row"><div class="ccard-emoji">📍</div><div class="ccard-body"><div class="ccard-name">${s.name}</div><div class="ccard-desc">${s.desc}</div>
        <div class="ccard-badges"><span class="sm teal">${s.cat}</span></div>
        <div class="ccard-link"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg> Google 지도에서 보기</div></div></div>`;
          c.onclick = () => window.open(gmap(s.gmap), '_blank');
          list.appendChild(c);
        });
      }

      // "직접 추가" form at bottom of card list
      const catLabel = { museum: '미술관', food: '맛집', tour: '투어', spot: '관광지' }[cCat];
      const cityLabel = cCity === 'nice' ? '니스' : '파리';
      const addWrap = document.createElement('div');
      addWrap.innerHTML = `<button class="custom-toggle" id="contentCustomToggle">✏️ ${cityLabel} ${catLabel} 직접 추가하기</button>
    <div class="custom-form" id="contentCustomForm" style="display:none">
      <label>이름 *</label><input id="ccName" placeholder="예: ${cCat === 'food' ? '카페 드 플로르' : cCat === 'tour' ? '몽생미셸 투어' : cCat === 'museum' ? '퐁피두 센터' : '시테섬 산책'}">
      <label>설명 (선택)</label><input id="ccDesc" placeholder="간단한 설명">
      <label>가격 (선택)</label><input id="ccPrice" placeholder="예: €€ 또는 15~25€">
      <label>링크 (선택)</label><input id="ccLink" placeholder="구글맵 링크, 예약 페이지, 블로그 등 아무 URL">
      <button class="custom-submit" id="ccSubmit">컨텐츠에 추가</button>
    </div>`;
      list.appendChild(addWrap);
      addWrap.querySelector('#contentCustomToggle').onclick = () => {
        const f = addWrap.querySelector('#contentCustomForm');
        f.style.display = f.style.display === 'none' ? 'block' : 'none';
      };
      addWrap.querySelector('#ccSubmit').onclick = () => {
        const name = addWrap.querySelector('#ccName').value.trim();
        if (!name) { toast('이름을 입력하세요'); return; }
        const desc = addWrap.querySelector('#ccDesc').value.trim();
        const price = addWrap.querySelector('#ccPrice').value.trim();
        const link = addWrap.querySelector('#ccLink').value.trim();
        const zo = cCity === 'nice' ? 'nice-center' : 'paris-louvre';
        // 링크가 URL이면 link로, 아니면 gmap 검색어로 저장
        const isUrl = link.startsWith('http') || link.startsWith('www');
        const newItem = { id: 'CU' + Date.now(), name, desc, price, type: cCat, city: cCity, zone: zo, cat: cCat === 'food' ? '캐주얼' : cCat === 'spot' ? '기타' : '', rsv: '불필요', gmap: isUrl ? name + ' ' + cityLabel : link || name + ' ' + cityLabel };
        if (isUrl) newItem.link = link;
        S.custom.push(newItem); save();
        toast(name + ' 추가됨'); renderContent();
      };
    }

    // ========== CHECKLIST ==========
    function renderChk() {
      const w = document.getElementById('checkWrap'); w.innerHTML = '';
      [['essential', '필수', '필수'], ['recommend', '추천', '추천']].forEach(([key, label]) => {
        w.insertAdjacentHTML('beforeend', `<div class="chk-title">${label}</div>`);
        const ul = document.createElement('div'); ul.className = 'chk-list';
        SUPPLIES[key].forEach((item, i) => {
          const k = `${key}_${i}`, done = S.chk[k] || false;
          const el = document.createElement('div'); el.className = 'chk' + (done ? ' done' : '');
          el.innerHTML = `<div class="chk-box">${done ? '✓' : ''}</div><div><div class="chk-text">${item.t}</div><div class="chk-memo">${item.m}</div></div>`;
          el.onclick = () => { S.chk[k] = !S.chk[k]; save(); el.classList.toggle('done'); el.querySelector('.chk-box').textContent = S.chk[k] ? '✓' : ''; };
          ul.appendChild(el);
        });
        w.appendChild(ul);
      });
    }

    // ========== TIPS ==========
    function renderTips() {
      const w = document.getElementById('tipsWrap'); w.innerHTML = '';
      Object.entries(TIPS).forEach(([g, items]) => {
        const s = document.createElement('div'); s.className = 'tip-sec';
        s.innerHTML = `<div class="tip-title">${g}</div>`;
        items.forEach(t => { const c = document.createElement('div'); c.className = 'tip-c'; c.textContent = t; s.appendChild(c); });
        w.appendChild(s);
      });
    }

    // ========== INIT ==========
    renderTL(); renderContent(); renderChk(); renderTips();
  </script>
</body>

</html>
